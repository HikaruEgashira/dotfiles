name: "CI"
on:
  push:
    branches:
      - main
    paths:
      - "flake.nix"
      - "flake.lock"
      - "home.nix"
      - "modules/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v12
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build home-manager configuration
        run: nix flake check
